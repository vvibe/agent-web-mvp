# fly.toml — agent-web-mvp deployment
# Reference: https://fly.io/docs/reference/configuration/

app = 'agent-web-mvp-renddi'
primary_region = 'nrt' # Tokyo — closest Fly region to Taiwan

[build]

[http_service]
  internal_port = 8787
  force_https = true
  # Keep the machine running so the long-lived daemon WS doesn't get
  # killed by Fly's idle scaling. Single instance (no HA) keeps cost low.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[env]
  PUBLIC_URL = 'https://agent-web-mvp-renddi.fly.dev'
  # Locks the WebSocket Origin allowlist to the production host so the dev
  # localhost origins (used as fallback in server/index.ts) never apply here.
  ALLOWED_ORIGINS = 'https://agent-web-mvp-renddi.fly.dev'
  DB_PATH = '/data/app.db'
  NODE_ENV = 'production'
  # Server-side opt-in for Codex sessions. Without this the server refuses
  # every `create_session` for agent='codex' (see server/index.ts). Stored
  # in [env] rather than `fly secrets` because it's a policy flag, not a
  # credential — keeping it in git makes "when did we enable codex?"
  # answerable via blame.
  CODEX_TRUST_DEFAULTS = '1'

[[mounts]]
  source = 'agent_web_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
